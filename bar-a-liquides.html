<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bar à Liquides — J&S Sun Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --border: rgba(255,255,255,0.07);
  --accent: #c9a84c;
  --accent2: #ff6b6b;
  --accent3: #7eb8f7;
  --text: #e8e8f0;
  --text-dim: #a2a2bd;
  --text-dimmer: #6a6a86;
  --tr: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  background:rgba(10,10,15,0.94);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  display:flex; align-items:center;
  height:68px;
}

.nav-logo {
  height:50px; width:auto; flex-shrink:0; margin-right:28px;
  filter:drop-shadow(0 0 8px rgba(201,168,76,0.25));
  transition:filter 0.3s;
}
.nav-logo:hover { filter:drop-shadow(0 0 16px rgba(201,168,76,0.55)); }

.nav-links { display:flex; align-items:center; gap:2px; flex:1; flex-wrap:wrap; }

.nav-link {
  text-decoration:none;
  font-family:'DM Sans',sans-serif;
  font-size:0.72rem; font-weight:600; letter-spacing:0.07em;
  color:var(--text-dim);
  padding:6px 13px; border-radius:5px;
  border:1px solid transparent;
  transition:all var(--tr); white-space:nowrap;
}
.nav-link:hover { color:var(--text); border-color:rgba(201,168,76,0.3); background:rgba(201,168,76,0.06); }
.nav-link.active { color:var(--accent); border-color:rgba(201,168,76,0.3); background:rgba(201,168,76,0.07); }

.nav-burger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; margin-left:auto; }
.nav-burger span { display:block; width:22px; height:2px; background:var(--accent); border-radius:2px; }
.nav-mobile {
  display:none; position:fixed; top:68px; left:0; right:0;
  background:rgba(10,10,15,0.98); border-bottom:1px solid var(--border);
  padding:14px; flex-direction:column; gap:4px; z-index:199;
  backdrop-filter:blur(20px);
}
.nav-mobile.open { display:flex; }
.nav-mobile .nav-link { font-size:0.9rem; padding:10px 16px; }

.page { padding-top:68px; min-height:100vh; }

@media(max-width:880px) {
  nav { padding:0 16px; }
  .nav-links { display:none; }
  .nav-burger { display:flex; }
}

/* Global search bar */
.global-search-section{width:100%;max-width:600px;margin:28px auto 0;padding:0 20px;position:relative;z-index:1;}
.global-search-wrap{position:relative;}
.global-search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);pointer-events:none;}
.global-search-input{
  width:100%;background:var(--surface);border:2px solid var(--border);
  border-radius:50px;padding:14px 20px 14px 48px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;
  outline:none;transition:all .25s;box-sizing:border-box;
}
.global-search-input:focus{border-color:var(--accent);background:rgba(201,168,76,.04);box-shadow:0 0 0 4px rgba(201,168,76,.1);}
.global-search-input::placeholder{color:var(--text-dimmer);}
.global-search-results{
  display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  max-height:360px;overflow-y:auto;z-index:200;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}
.global-search-results.open{display:block;}
.search-result-item{
  padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .15s;display:flex;align-items:center;gap:12px;
}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:hover{background:rgba(201,168,76,.06);}
.sri-label{font-size:0.72rem;color:var(--text-dimmer);margin-bottom:2px;text-transform:uppercase;letter-spacing:.08em;}
.sri-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:#fff;}
.sri-brand{font-size:0.75rem;color:var(--text-dim);}
.sri-cat{font-size:0.65rem;padding:2px 7px;border-radius:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--accent);font-weight:600;white-space:nowrap;}
.search-no-result{padding:20px;text-align:center;color:var(--text-dimmer);font-size:0.9rem;}

/* === VIEWS === */
.view{display:none;}.view.active{display:block;}

/* === MENU === */
.menu-wrap{max-width:1000px;margin:0 auto;padding:36px 40px 64px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.menu-heading{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.5rem,3vw,2.2rem);letter-spacing:-.02em;color:#fff;margin-bottom:6px;}
.menu-heading span{color:var(--accent);}
.menu-sub{font-size:0.9rem;color:var(--text-dim);margin-bottom:18px;}
.ms-wrap{position:relative;margin-bottom:16px;width:100%;max-width:440px;}
.ms-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);pointer-events:none;}
.ms-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px 12px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;box-sizing:border-box;}
.ms-input:focus{border-color:rgba(201,168,76,.4);}
.ms-input::placeholder{color:var(--text-dimmer);}
.frais-sel{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;justify-content:center;}
.f-btn{padding:8px 20px;border-radius:20px;font-size:0.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:all .2s;font-family:'DM Sans',sans-serif;}
.f-btn:hover{border-color:rgba(201,168,76,.35);color:var(--text);}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0f;}
/* Pill grid — exactly 4 cols */
.pill-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;width:100%;margin-bottom:28px;}
.m-pill{padding:13px 15px;border-radius:11px;font-size:0.95rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:all .2s;user-select:none;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;}
.m-pill:hover{border-color:rgba(201,168,76,.4);color:var(--text);background:rgba(201,168,76,.06);}
.m-pill.sel{background:var(--accent);border-color:var(--accent);color:#0a0a0f;font-weight:700;}
.p-left{display:flex;align-items:center;gap:9px;}
.p-ico{width:36px;height:36px;object-fit:contain;flex-shrink:0;}
.p-name{font-size:0.95rem;line-height:1;letter-spacing:0;}
.p-cnt{font-size:0.75rem;opacity:.55;white-space:nowrap;flex-shrink:0;}
.m-pill.sel .p-cnt{font-size:0.75rem;opacity:.55;white-space:nowrap;flex-shrink:0;}
.sel-summary{font-size:0.85rem;color:var(--text-dim);margin-bottom:20px;min-height:20px;}
.sel-summary span{color:var(--accent);font-weight:600;}
.menu-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-go{padding:14px 42px;background:var(--accent);color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;letter-spacing:.08em;text-transform:uppercase;border-radius:7px;border:none;cursor:pointer;transition:background .2s;}
.btn-go:hover{background:#e2c97e;}
.btn-rst{padding:14px 24px;background:transparent;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.82rem;border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .2s;}
.btn-rst:hover{border-color:rgba(255,80,80,.4);color:#ff6b6b;}

/* === GALLERY HEADER === */
.gal-hdr{position:sticky;top:66px;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:11px 40px;}
.gal-hdr-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.bk-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.bk-btn:hover{border-color:rgba(201,168,76,.4);color:var(--accent);}
.act-filters{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.act-tag{padding:4px 10px;border-radius:14px;font-size:0.75rem;font-weight:600;background:var(--accent);border:1px solid var(--accent);color:#0a0a0f;cursor:pointer;transition:all .2s;white-space:nowrap;}
.act-tag:hover{background:#e2c97e;}
.gal-stats{font-size:0.8rem;color:var(--text-dim);white-space:nowrap;}
.gal-cnt{color:var(--accent);font-weight:700;}
/* Inline search in gallery header */
.gs-wrap{position:relative;}
.gs-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);pointer-events:none;}
.gs-input{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 12px 7px 34px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;width:200px;transition:border-color .2s;cursor:pointer;}
.gs-input:focus{border-color:rgba(201,168,76,.4);}
.gs-input::placeholder{color:var(--text-dimmer);}

/* === GRID — always 4 cols === */
.grid-wrap{max-width:1400px;margin:0 auto;padding:20px 40px 64px;}
.fam-section{margin-bottom:8px;}
.fam-section-title{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin:80px 0 40px;text-align:center;}
.fam-section:first-child .fam-section-title{margin-top:24px;}
.fam-section-title .fam-ico{width:54px;height:54px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;}
.fam-section-title .fam-ico img{width:32px;height:32px;object-fit:contain;}
.fam-section-title h2{font-family:'Syne',sans-serif;font-weight:800;font-size:2.15rem;color:#fff;letter-spacing:.02em;margin:0;}
.fam-section-title .fam-cnt{font-size:0.78rem;color:var(--text-dimmer);font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
.fam-section-sep{height:1px;width:120px;background:var(--border);margin:0 auto 48px;}
#grid{display:flex;flex-direction:column;}
.fam-cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}

/* === CARD === */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeIn .2s ease both;display:flex;flex-direction:column;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.28);box-shadow:0 8px 22px rgba(0,0,0,.5);}

/* Image — uniform padding so all bottles look same size */
.card-img{
  width:100%;aspect-ratio:1;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  padding:14%;box-sizing:border-box;
}
.card-img img{width:100%;height:100%;object-fit:contain;transition:transform .35s;}
.card:hover .card-img img{transform:scale(1.07);}
.card-ph{display:flex;flex-direction:column;align-items:center;gap:6px;}
.card-ph .p-ico{width:36px;height:36px;object-fit:contain;flex-shrink:0;}
.card-ph-icon{font-size:2rem;}
.card-ph-brand{font-size:0.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dimmer);text-align:center;}
.frais-badge{position:absolute;top:7px;right:7px;background:rgba(126,184,247,.14);border:1px solid rgba(126,184,247,.3);color:var(--accent3);font-size:0.6rem;padding:2px 6px;border-radius:6px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}

/* Body */
.card-body{padding:11px 12px 13px;display:flex;flex-direction:column;gap:4px;flex:1;}
.c-brand{font-size:0.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dimmer);}
/* SINGLE LINE name with ellipsis — no reserved space for a 2nd line */
.c-name{
  font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;
  color:#fff;line-height:1.25;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:0;
}
.c-aromes{font-size:0.82rem;color:var(--text-dim);font-style:italic;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.7em;}
.c-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px;}
.m-tag{font-size:0.63rem;font-weight:600;padding:2px 6px;border-radius:5px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);color:rgba(201,168,76,.8);white-space:nowrap;}
.m-tag.red{background:rgba(255,60,60,.08);border-color:rgba(255,60,60,.25);color:#ff6b6b;}
.m-tag.ice{background:rgba(126,184,247,.1);border-color:rgba(126,184,247,.3);color:var(--accent3);}
.c-price{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:#ff6b6b;margin-top:auto;padding-top:5px;}

/* === KEYBOARD OVERLAY === */
.kbd-ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);align-items:flex-end;justify-content:center;}
.kbd-ov.open{display:flex;}
.kbd-box{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:14px;width:100%;max-width:840px;}
.kbd-top{display:flex;gap:8px;margin-bottom:10px;}
.kbd-val{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 15px;color:var(--text);font-size:1.05rem;outline:none;}
.kbd-val:focus{border-color:rgba(201,168,76,.4);}
.kbd-x{padding:10px 15px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:'DM Sans',sans-serif;}
.kbd-x:hover{border-color:#ff6b6b;color:#ff6b6b;}
.kbd-rows{display:flex;flex-direction:column;gap:5px;}
.kbd-row{display:flex;gap:4px;justify-content:center;}
.kbd-k{
  flex:1;min-width:0;max-width:72px;
  padding:13px 4px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:1rem;font-family:'DM Sans',sans-serif;font-weight:600;
  cursor:pointer;text-align:center;transition:all .12s;user-select:none;
  min-height:48px;display:flex;align-items:center;justify-content:center;
}
.kbd-k:active,.kbd-k:hover{background:rgba(201,168,76,.18);border-color:var(--accent);color:var(--accent);}
.kbd-k.w2{max-width:130px;flex:2;}
.kbd-k.w4{max-width:320px;flex:4;}

@media(max-width:1100px){.fam-cards-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){.pill-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;width:100%;margin-bottom:28px;}}
@media(max-width:768px){.gal-hdr{padding:10px 16px;}.grid-wrap{padding:14px 16px 48px;}.fam-cards-grid{grid-template-columns:repeat(2,1fr);gap:10px;}.gs-input{width:130px;}.fam-section-title{margin:56px 0 28px;}.fam-section-title h2{font-size:1.5rem;}.fam-section-title .fam-ico{width:44px;height:44px;font-size:1.3rem;}}
@media(max-width:600px){.menu-wrap{padding:20px 16px 48px;}.pill-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;width:100%;margin-bottom:28px;}}
.bal-page{display:flex;gap:26px;align-items:flex-start;min-height:calc(100vh - 68px);}
.bal-sb{width:238px;flex-shrink:0;background:transparent;padding:88px 4px 60px 22px;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto;}
.bal-sb-title{display:block;font-size:0.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dimmer);padding:0 6px 14px;}
.cat-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;margin-bottom:10px;padding:12px 13px;position:relative;overflow:hidden;background:var(--surface2);border:1px solid var(--border);border-radius:13px;cursor:pointer;line-height:1.2;box-shadow:0 2px 8px rgba(0,0,0,.25);transition:transform .2s cubic-bezier(.4,0,.2,1),border-color .2s,background .2s,box-shadow .2s;}
.cat-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform .2s;}
.cat-btn:hover{transform:translateY(-2px);box-shadow:0 9px 22px rgba(0,0,0,.42);}
.cat-btn.active{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08);}
.cat-btn.active::before{transform:scaleY(1);}
.cat-ic{flex-shrink:0;width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.15rem;}
.cat-tx{flex:1;min-width:0;}
.cat-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;color:var(--text);letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-sub{font-size:0.62rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dimmer);margin-top:3px;}
.bal-main{flex:1;min-width:0;}
.bal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#fff;margin:0;white-space:nowrap;}
@media(max-width:900px){.bal-sb{width:204px;padding-left:14px;}.cat-ic{width:34px;height:34px;font-size:1.05rem;}.cat-nm{font-size:0.86rem;}}
@media(max-width:640px){
  .bal-page{flex-direction:column;gap:0;}
  .bal-sb{width:100%;height:auto;position:static;display:flex;flex-wrap:nowrap;gap:10px;padding:12px 12px 4px;overflow-x:auto;overflow-y:visible;}
  .bal-sb-title{display:none;}
  .cat-btn{margin-bottom:0;flex:0 0 auto;width:auto;padding:9px 13px;}
  .cat-sub{display:none;}
  .cat-ic{width:30px;height:30px;font-size:1rem;}
}

</style>
</head>

  <a href="cigarettes.html" class="nav-link" data-page="cigarettes">Cigarettes Élec.</a>  <a href="actus.html" class="nav-link" data-page="actus">Actus</a>
</div>
<div class="page">
  <div class="bal-page">
    <aside class="bal-sb" id="bal-sb"></aside>
    <div class="bal-main">
      <div class="gal-hdr">
        <div class="gal-hdr-inner">
          <h1 class="bal-title">Bar à <span>Liquides</span></h1>
          <div class="act-filters" id="atf"></div>
          <div class="gs-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="gsi" class="gs-input" placeholder="Affiner…" autocomplete="off" readonly>
          </div>
          <div class="gal-stats"><span id="gc" class="gal-cnt">—</span> produits</div>

let _kbdRealInput=null,_kbdOverlay=null;
function openKbd(rId,oId){_kbdRealInput=document.getElementById(rId);_kbdOverlay=document.getElementById(oId);const kv=_kbdOverlay.querySelector('.kbd-val');if(kv)kv.value=_kbdRealInput.value;_kbdOverlay.classList.add('open');if(kv)kv.focus();}
function closeKbd(oId){document.getElementById(oId)?.classList.remove('open');}
function kbdPress(ch,oId){const kv=document.getElementById(oId)?.querySelector('.kbd-val');if(!kv)return;if(ch==='⌫')kv.value=kv.value.slice(0,-1);else if(ch==='␣')kv.value+=' ';else kv.value+=ch;if(_kbdRealInput){_kbdRealInput.value=kv.value;_kbdRealInput.dispatchEvent(new Event('input',{bubbles:true}));}}
function buildKbd(oId,rId,ph){const rows=[['A','Z','E','R','T','Y','U','I','O','P'],['Q','S','D','F','G','H','J','K','L','M'],['W','X','C','V','B','N','É','È','Ê','À'],['1','2','3','4','5','6','7','8','9','0']];const rH=rows.map(r=>`<div class="kbd-row">${r.map(k=>`<button class="kbd-k" onclick="kbdPress('${k}','${oId}')">${k}</button>`).join('')}</div>`).join('');return `<div class="kbd-box"><div class="kbd-top"><input class="kbd-val" placeholder="${ph}" autocomplete="off"><button class="kbd-x" onclick="closeKbd('${oId}')">✕</button></div><div class="kbd-rows">${rH}<div class="kbd-row"><button class="kbd-k w2" onclick="kbdPress('⌫','${oId}')">⌫</button><button class="kbd-k w4" onclick="kbdPress('␣','${oId}')">ESPACE</button><button class="kbd-k w2" onclick="closeKbd('${oId}')">OK ✓</button></div></div></div>`;}
function buildCard(p){const el=document.createElement('div');el.className='card';const themes=p.familles||[];const ft=themes[0]||'';const TEMI=typeof THEME_ICONS!=='undefined'?THEME_ICONS:{};const TEME=typeof THEME_EMOJI!=='undefined'?THEME_EMOJI:FAM_EMOJI||{};let imgH='';if(p.img){imgH=`<img src="${p.img}" alt="${p.nom}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-ph" style="display:none">${TEMI[ft]?`<img class="p-ico" src="${TEMI[ft]}">`:`<div class="card-ph-icon">${TEME[ft]||'💧'}</div>`}<div class="card-ph-brand">${p.marque.substring(0,12)}</div></div>`;}else{imgH=`<div class="card-ph">${TEMI[ft]?`<img class="p-ico" src="${TEMI[ft]}">`:`<div class="card-ph-icon">${TEME[ft]||'💧'}</div>`}<div class="card-ph-brand">${p.marque.substring(0,12)}</div></div>`;}const pgvgH=p.pg_vg&&p.pg_vg!=='—'&&p.pg_vg!==''?`<span class="m-tag">PG/VG ${p.pg_vg}</span>`:`<span class="m-tag red">PG/VG manquant</span>`;const fraisH=p.frais?`<span class="m-tag ice">❄ Frais</span>`:'';el.innerHTML=`<div class="card-img">${imgH}${p.frais?'<span class="frais-badge">❄</span>':''}</div><div class="card-body"><div class="c-brand">${p.marque}</div><div class="c-name">${p.nom}</div><div class="c-aromes">${p.aromes||'—'}</div><div class="c-meta">${pgvgH}${fraisH}</div></div>`;return el;}

let selF=new Set(),galQ='';
function buildSidebar(){
  const cnt={};for(const p of PRODUCTS)for(const f of p.familles)cnt[f]=(cnt[f]||0)+1;
  const sb=document.getElementById('bal-sb');
  sb.innerHTML='<div class="bal-sb-title">Familles</div>';
  for(const fam of ALL_FAMILIES){
    const n=cnt[fam]||0;
    const b=document.createElement('button');
    b.className='cat-btn'+(selF.has(fam)?' active':'');
    const ico=THEME_ICONS[fam]?`<img class="p-ico" src="${THEME_ICONS[fam]}" alt="">`:`<div class="cat-ic">${FAM_EMOJI[fam]||'💧'}</div>`;
    b.innerHTML=`${ico}<div class="cat-tx"><div class="cat-nm">${fam}</div><div class="cat-sub">${n} produit${n>1?'s':''}</div></div>`;
    b.onclick=()=>toggleF(fam);
    sb.appendChild(b);
  }
}
function toggleF(f){selF.has(f)?selF.delete(f):selF.add(f);buildSidebar();renderTags();renderGal();}
function renderTags(){const c=document.getElementById('atf');c.innerHTML='';for(const t of selF){const tag=document.createElement('button');tag.className='act-tag';tag.innerHTML=`${FAM_EMOJI[t]||''} ${t} ✕`;tag.onclick=()=>{selF.delete(t);buildSidebar();renderTags();renderGal();};c.appendChild(tag);}}
function getFilt(){return PRODUCTS.filter(p=>{if(galQ){const q=galQ.toLowerCase();if(!p.nom.toLowerCase().includes(q)&&!p.marque.toLowerCase().includes(q)&&!p.aromes.toLowerCase().includes(q))return false;}if(selF.size>0&&![...selF].every(f=>p.familles.includes(f)))return false;return true;});}
function renderGal(){
  const f=getFilt(),g=document.getElementById('grid');g.innerHTML='';
  document.getElementById('gc').textContent=f.length;
  if(!f.length){const d=document.createElement('div');d.style.cssText='text-align:center;padding:60px;color:var(--text-dimmer);';d.innerHTML='🔍 Aucun produit.';g.appendChild(d);return;}
  const groups={};
  for(const p of f){const fam=(p.familles&&p.familles[0])||'Autres';(groups[fam]=groups[fam]||[]).push(p);}
  const orderedFams=ALL_FAMILIES.filter(fam=>groups[fam]&&groups[fam].length);
  for(const k of Object.keys(groups)){if(!orderedFams.includes(k))orderedFams.push(k);}
  let i=0;
  for(const fam of orderedFams){
    const list=groups[fam];if(!list||!list.length)continue;
    const sec=document.createElement('div');sec.className='fam-section';
    const ico=THEME_ICONS[fam]?`<img src="${THEME_ICONS[fam]}" alt="">`:(FAM_EMOJI[fam]||'💧');
    const title=document.createElement('div');title.className='fam-section-title';
    title.innerHTML=`<div class="fam-ico">${ico}</div><h2>${fam}</h2><span class="fam-cnt">${list.length} produit${list.length>1?'s':''}</span>`;
    sec.appendChild(title);
    const sep=document.createElement('div');sep.className='fam-section-sep';
    sec.appendChild(sep);
    const grid=document.createElement('div');grid.className='fam-cards-grid';
    list.forEach(p=>{const c=buildCard(p);c.style.animationDelay=Math.min(i*5,180)+'ms';i++;grid.appendChild(c);});
    sec.appendChild(grid);
    g.appendChild(sec);
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  buildSidebar();renderGal();
  const gsi=document.getElementById('gsi');
  if(gsi)gsi.addEventListener('input',e=>{galQ=e.target.value.trim();renderGal();});
  const ov=document.getElementById('kbd-ov');
  ov.innerHTML=buildKbd('kbd-ov','gsi','Rechercher…');
  gsi?.addEventListener('click',()=>openKbd('gsi','kbd-ov'));
  ov.addEventListener('click',e=>{if(e.target===ov)closeKbd('kbd-ov');});
  document.querySelectorAll('.nav-link').forEach(a=>{if(a.dataset.page===document.body.dataset.page)a.classList.add('active');});
});

// Exposé pour permettre au module Firebase de réassigner la vraie variable PRODUCTS
window.updateProducts = function(newProducts){
  PRODUCTS = newProducts;
  if (typeof buildPills === 'function') buildPills();
  if (typeof renderGal === 'function') renderGal();
};

</script>
