function log(msg){
  document.getElementById('log').textContent += msg + '\n';
}

window.login = async () => {
  const provider = new GoogleAuthProvider();
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    log('Erreur connexion: ' + e.message);
  }
};

onAuthStateChanged(auth, user => {
  if(user){
    log('Connecté en tant que ' + user.email);
    document.getElementById('migrate-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Connecté ✓';
    document.getElementById('login-btn').disabled = true;
  }
});

window.migrate = async () => {
  document.getElementById('migrate-btn').disabled = true;
  log('--- Vérification existant ---');

  const aromesSnap = await get(ref(db, 'aromes'));
  const concSnap = await get(ref(db, 'concentres'));

  if(aromesSnap.exists() && Object.keys(aromesSnap.val()).length > 50){
    log('⚠ La base "aromes" contient déjà ' + Object.keys(aromesSnap.val()).length + ' entrées. Migration annulée pour éviter les doublons.');
    log('Si vous voulez réellement migrer, supprimez d\'abord manuellement le noeud "aromes" dans la console Firebase.');
    return;
  }

  log('--- Migration arômes (' + AROMES.length + ' produits) ---');
  const aromesObj = {};
  AROMES.forEach((p, i) => {
    const key = 'static_' + i;
    aromesObj[key] = { ...p, _admin: true, createdAt: Date.now() };
  });
  await set(ref(db, 'aromes'), aromesObj);
  log('✓ ' + AROMES.length + ' arômes migrés.');

  log('--- Migration concentrés (' + CONCENTRES.length + ' produits) ---');
  const concObj = {};
  CONCENTRES.forEach((p, i) => {
    const key = 'static_' + i;
    concObj[key] = { ...p, _admin: true, createdAt: Date.now() };
  });
  await set(ref(db, 'concentres'), concObj);
  log('✓ ' + CONCENTRES.length + ' concentrés migrés.');

  log('');
  log('🎉 Migration terminée ! Vous pouvez maintenant gérer tous les produits depuis admin.html');
  log('Pensez à supprimer ce fichier migrate.html du site.');
};
