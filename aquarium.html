<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aquarium Magique — J&S Sun Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
:root{
  --bg:#0a0a0f; --surface:#13131a; --accent:#c9a84c;
  --text:#e8e8f0; --text-dim:#a2a2bd;
  /* Palette guide de style */
  --corail:#FF6F61; --orange:#FFB347; --jaune:#FFD166; --rose:#FF6FAE;
  --lavande:#A78BFA; --menthe:#4CC9B0; --turquoise:#219EBC; --bleu-profond:#005F73;
  --creme:#F7F7F2;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* ── Top bar (player-like) ── */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;gap:14px;padding:0 18px;background:rgba(10,10,15,.85);backdrop-filter:blur(10px);z-index:50;transition:opacity .3s;}
.topbar.hidden{opacity:0;pointer-events:none;}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.06);transition:background .2s;}
.back-btn:hover{background:rgba(255,255,255,.12);}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:var(--accent);flex:1;text-align:center;}
.fs-btn{background:rgba(255,255,255,.06);border:none;color:var(--text);width:38px;height:38px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.fs-btn:hover{background:rgba(255,255,255,.12);}

/* ── Aquarium viewport (the "video") ── */
.player-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
.aquarium-frame{position:relative;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#bdeaf5 0%,#6cc6dd 30%,var(--turquoise) 60%,var(--bleu-profond) 100%);cursor:pointer;}

/* Light rays */
.light-ray{position:absolute;top:-10%;width:120px;height:140%;background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,0));transform:rotate(8deg);pointer-events:none;}
.light-ray.r2{left:30%;width:80px;transform:rotate(-6deg);opacity:.6;}
.light-ray.r3{left:65%;width:100px;transform:rotate(10deg);opacity:.5;}

/* Floating sparkles (étoiles scintillantes) */
.sparkle{position:absolute;animation:twinkle ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{
  0%,100%{opacity:.2;transform:scale(.7);}
  50%{opacity:1;transform:scale(1.1);}
}

/* Bubbles */
.bubble{position:absolute;bottom:-40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);background:rgba(255,255,255,.12);animation:rise linear infinite;}
@keyframes rise{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  10%{opacity:.85;}
  90%{opacity:.6;}
  100%{transform:translateY(-115vh) translateX(20px);opacity:0;}
}

/* Seaweed */
.weed{position:absolute;bottom:0;transform-origin:bottom center;animation:sway ease-in-out infinite;}
.weed svg{display:block;}
@keyframes sway{
  0%,100%{transform:rotate(-5deg);}
  50%{transform:rotate(5deg);}
}

/* Coral */
.coral{position:absolute;bottom:0;}

/* Sand */
.sand{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(180deg,#f5e0b8,#e8c98a 60%,#d9b56e);border-radius:50% 50% 0 0 / 100% 100% 0 0;}

/* Starfish — tourne lentement */
.starfish{position:absolute;bottom:8px;z-index:3;animation:starfish-spin ease-in-out infinite;transform-origin:center;}
@keyframes starfish-spin{
  0%,100%{transform:rotate(-8deg);}
  50%{transform:rotate(8deg);}
}

/* Coquillage qui s'ouvre */
.shell-wrap{position:absolute;bottom:6px;z-index:3;}
.shell-top{animation:shell-open ease-in-out infinite;transform-origin:bottom center;}
@keyframes shell-open{
  0%,40%,100%{transform:rotate(0deg);}
  60%,80%{transform:rotate(-18deg) translateY(-2px);}
}

/* Fish swim */
.fish{position:absolute;animation:swim linear infinite;}
.fish svg{display:block;}
@keyframes swim{
  0%{transform:translateX(-10vw) translateY(0);}
  50%{transform:translateX(55vw) translateY(-20px);}
  100%{transform:translateX(120vw) translateY(10px);}
}
@keyframes swim-rev{
  0%{transform:translateX(10vw) translateY(0) scaleX(-1);}
  50%{transform:translateX(-55vw) translateY(15px) scaleX(-1);}
  100%{transform:translateX(-120vw) translateY(-10px) scaleX(-1);}
}
/* Poisson curieux qui regarde la caméra : léger zoom + pause */
.fish.curious{animation:swim-curious linear infinite;}
@keyframes swim-curious{
  0%{transform:translateX(-10vw) translateY(0) scale(1);}
  40%{transform:translateX(40vw) translateY(-10px) scale(1);}
  50%{transform:translateX(45vw) translateY(-10px) scale(1.12);}
  60%{transform:translateX(50vw) translateY(-10px) scale(1);}
  100%{transform:translateX(120vw) translateY(8px) scale(1);}
}

/* Tortue : nage + cligne des yeux */
.turtle{position:absolute;animation:swim-turtle linear infinite;}
.turtle svg{display:block;}
@keyframes swim-turtle{
  0%{transform:translateX(-15vw) translateY(0);}
  50%{transform:translateX(55vw) translateY(-14px);}
  100%{transform:translateX(125vw) translateY(6px);}
}
.turtle-eye{animation:blink 4s ease-in-out infinite;}
@keyframes blink{
  0%,92%,100%{transform:scaleY(1);}
  95%{transform:scaleY(0.1);}
}

/* Méduse : remonte lentement en ondulant */
.jellyfish{position:absolute;animation:jelly-rise ease-in-out infinite;}
.jellyfish svg{display:block;}
@keyframes jelly-rise{
  0%{transform:translateY(0) translateX(0);}
  25%{transform:translateY(-18px) translateX(8px);}
  50%{transform:translateY(-32px) translateX(-4px);}
  75%{transform:translateY(-16px) translateX(6px);}
  100%{transform:translateY(0) translateX(0);}
}
.jelly-tentacle{animation:tentacle-wave ease-in-out infinite;transform-origin:top center;}
@keyframes tentacle-wave{
  0%,100%{transform:rotate(-4deg);}
  50%{transform:rotate(4deg);}
}

/* Poisson-globe : se gonfle */
.pufferfish{position:absolute;animation:swim linear infinite;}
.puffer-body{animation:puff ease-in-out infinite;transform-origin:center;}
@keyframes puff{
  0%,60%,100%{transform:scale(1);}
  80%{transform:scale(1.18);}
}

/* Hippocampe : se balance */
.seahorse{position:absolute;animation:seahorse-bob ease-in-out infinite;}
.seahorse svg{display:block;}
@keyframes seahorse-bob{
  0%,100%{transform:translateY(0) rotate(-4deg);}
  50%{transform:translateY(-10px) rotate(4deg);}
}

/* Pieuvre : fait un petit signe */
.octopus{position:absolute;}
.octopus svg{display:block;}
.octo-arm-wave{animation:octo-wave 1.4s ease-in-out infinite;transform-origin:80% 30%;}
@keyframes octo-wave{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(-22deg);}
}
.octo-body-bob{animation:octo-bob 5s ease-in-out infinite;}
@keyframes octo-bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* Crabe : sort et marche */
.crab{position:absolute;bottom:6px;animation:crab-walk ease-in-out infinite;}
.crab svg{display:block;}
@keyframes crab-walk{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(22px);}
}
.crab-leg{animation:crab-leg-move 0.5s ease-in-out infinite;transform-origin:top center;}
@keyframes crab-leg-move{
  0%,100%{transform:rotate(-6deg);}
  50%{transform:rotate(6deg);}
}

/* Mermaid */
.mermaid-wrap{position:absolute;bottom:10%;opacity:0;pointer-events:none;z-index:20;transition:opacity 1.2s ease;}
.mermaid-wrap.show{opacity:1;animation:mermaid-swim-in 12s ease-in-out forwards;}
.mermaid-wrap svg{display:block;filter:drop-shadow(0 4px 16px rgba(0,0,0,.35));}
@keyframes mermaid-swim-in{
  0%{left:-30%;transform:translateY(0) scale(.9);}
  12%{transform:translateY(-10px) scale(1);}
  45%{left:38%;transform:translateY(6px) scale(1.08);}
  55%{left:38%;transform:translateY(0) scale(1.08);}
  85%{left:38%;transform:translateY(-4px) scale(1.04);}
  100%{left:125%;transform:translateY(0) scale(.95);}
}
.mermaid-wave{animation:wave-hand 0.7s ease-in-out infinite;transform-origin:75% 70%;}
@keyframes wave-hand{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(-22deg);}
}
.mermaid-tail{animation:tail-flutter 1.6s ease-in-out infinite;transform-origin:20% 50%;}
@keyframes tail-flutter{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(4deg);}
}

/* Loading veil */
.loading-veil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--turquoise);z-index:40;transition:opacity .6s;}
.loading-veil.hide{opacity:0;pointer-events:none;}
.loading-veil span{font-family:'Syne',sans-serif;color:#fff;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;opacity:.85;}

@media(max-width:700px){
  .topbar-title{font-size:.8rem;}
  .back-btn span{display:none;}
}
</style>
</head>
<body>

<div class="player-wrap">
  <div class="aquarium-frame" id="frame">
    <div class="loading-veil" id="loadingVeil"><span>Chargement de l'aquarium…</span></div>
    <div id="sceneRoot"></div>
  </div>
</div>

<div class="topbar" id="topbar">
  <a href="index.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span>Accueil</span>
  </a>
  <div class="topbar-title">🐠 Aquarium Magique</div>
  <button class="fs-btn" id="fsBtn" title="Plein écran">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>
</div>

<script>
/* ════════════════ SCENE BUILD — Aquarium Fascinant (guide de style) ════════════════ */
const root = document.getElementById('sceneRoot');

function el(html){
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstChild;
}

/* -- Light rays -- */
root.appendChild(el('<div class="light-ray"></div>'));
root.appendChild(el('<div class="light-ray r2"></div>'));
root.appendChild(el('<div class="light-ray r3"></div>'));

/* -- Sparkles (étoiles scintillantes flottantes) -- */
function sparkleSVG(color){
  return `<svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="${color}"/></svg>`;
}
function spawnSparkles(n){
  const colors = ['#FFD166','#FF6FAE','#A78BFA'];
  for(let i=0;i<n;i++){
    const size = 8 + Math.random()*10;
    const left = Math.random()*100;
    const top = 10 + Math.random()*70;
    const dur = 2 + Math.random()*2.5;
    const delay = Math.random()*-dur;
    const s = el(`<div class="sparkle" style="left:${left}%;top:${top}%;width:${size}px;height:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;">${sparkleSVG(colors[i%colors.length])}</div>`);
    root.appendChild(s);
  }
}
spawnSparkles(18);

/* -- Bubbles -- */
function spawnBubbles(n){
  for(let i=0;i<n;i++){
    const size = 6 + Math.random()*16;
    const left = Math.random()*100;
    const dur = 7 + Math.random()*10;
    const delay = Math.random()*-dur;
    const b = el(`<div class="bubble" style="width:${size}px;height:${size}px;left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;"></div>`);
    root.appendChild(b);
  }
}
spawnBubbles(20);

/* -- Seaweed (algues vert menthe qui ondulent) -- */
function weedSVG(color, h){
  const leaves = [];
  const n = Math.floor(h/22);
  for(let i=0;i<n;i++){
    const y = h - i*22 - 10;
    const side = i % 2 === 0 ? 1 : -1;
    leaves.push(`<path d="M20 ${y} Q${20+side*16} ${y-8} ${20+side*4} ${y-20}" stroke="${color}" stroke-width="5.5" fill="none" stroke-linecap="round"/>`);
  }
  return `<svg width="56" height="${h}" viewBox="0 0 56 ${h}">
    <path d="M20 ${h} C10 ${h*0.7} 32 ${h*0.45} 16 ${h*0.2} C28 ${h*0.05} 14 0 20 0"
      stroke="${color}" stroke-width="6" fill="none" stroke-linecap="round"/>
    ${leaves.join('')}
  </svg>`;
}
const weedSpots = [
  {left:'2%', h:140, color:'#2f9d6f', dur:'4.5s'},
  {left:'8%', h:95, color:'#4CC9B0', dur:'3.8s'},
  {left:'92%', h:160, color:'#2f9d6f', dur:'5.2s'},
  {left:'97%', h:105, color:'#4CC9B0', dur:'4s'},
  {left:'47%', h:85, color:'#2f9d6f', dur:'4.2s'},
  {left:'26%', h:115, color:'#4CC9B0', dur:'4.8s'},
  {left:'73%', h:100, color:'#2f9d6f', dur:'4.4s'},
];
weedSpots.forEach(w=>{
  const wrap = el(`<div class="weed" style="left:${w.left};animation-duration:${w.dur};"></div>`);
  wrap.innerHTML = weedSVG(w.color, w.h);
  root.appendChild(wrap);
});

/* -- Coral (corail rose/orange/violet, guide de style) -- */
function coralSVG(color){
  return `<svg width="110" height="95" viewBox="0 0 110 95">
    <g fill="${color}">
      <path d="M55 95 L55 58 Q44 48 47 32 Q49 20 55 8 Q61 20 63 32 Q66 48 55 58"/>
      <path d="M55 58 Q32 52 23 36 Q16 24 23 12 Q35 18 40 33 Q43 45 55 58"/>
      <path d="M55 58 Q78 52 87 36 Q94 24 87 12 Q75 18 70 33 Q67 45 55 58"/>
    </g>
    <g fill="#fff" opacity="0.45">
      <circle cx="52" cy="22" r="1.8"/><circle cx="60" cy="30" r="1.6"/><circle cx="48" cy="38" r="1.6"/>
      <circle cx="30" cy="22" r="1.6"/><circle cx="36" cy="32" r="1.4"/>
      <circle cx="80" cy="22" r="1.6"/><circle cx="74" cy="32" r="1.4"/>
    </g>
  </svg>`;
}
function coralBranchSVG(color){
  return `<svg width="70" height="85" viewBox="0 0 70 85">
    <g fill="${color}">
      <path d="M35 85 Q28 70 32 55 Q22 60 14 50 Q26 48 32 38 Q24 36 20 24 Q32 28 36 18 Q34 8 40 0 Q44 10 40 20 Q48 26 56 22 Q50 32 56 42 Q46 42 38 50 Q44 60 38 72 Q34 78 35 85 Z"/>
    </g>
  </svg>`;
}
const corals = [
  {left:'55%', type:'main', color:'#FF6FAE'},
  {left:'72%', type:'branch', color:'#FFB347'},
  {left:'4%', type:'branch', color:'#A78BFA'},
  {left:'85%', type:'main', color:'#FF6F61'},
];
corals.forEach(c=>{
  const wrap = el(`<div class="coral" style="left:${c.left};"></div>`);
  wrap.innerHTML = c.type === 'main' ? coralSVG(c.color) : coralBranchSVG(c.color);
  root.appendChild(wrap);
});

/* -- Sand -- */
root.appendChild(el('<div class="sand"></div>'));

/* -- Étoile de mer qui tourne -- */
function starfishSVG(color, size){
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
    <path d="M20 2 L25 15 L38 15 L27 23 L31 36 L20 28 L9 36 L13 23 L2 15 L15 15 Z" fill="${color}"/>
    <circle cx="20" cy="20" r="2" fill="#000" opacity="0.12"/>
  </svg>`;
}
const starfishSpots = [
  {left:'33%', color:'#FF6F61', size:32, dur:'5s'},
  {left:'62%', color:'#FFD166', size:24, dur:'4.3s'},
];
starfishSpots.forEach(s=>{
  const wrap = el(`<div class="starfish" style="left:${s.left};animation-duration:${s.dur};"></div>`);
  wrap.innerHTML = starfishSVG(s.color, s.size);
  root.appendChild(wrap);
});

/* -- Coquillage qui s'ouvre -- */
function shellSVG(){
  return `<svg width="58" height="40" viewBox="0 0 58 40">
    <path d="M2 36 Q29 40 56 36 Q50 20 29 16 Q8 20 2 36 Z" fill="#FF6FAE" opacity="0.9"/>
    <path d="M2 36 Q29 40 56 36" stroke="#fff" stroke-width="1" opacity="0.4" fill="none"/>
    <circle cx="29" cy="30" r="3" fill="#F7F7F2" opacity="0.8"/>
  </svg>`;
}
function shellTopSVG(){
  return `<svg width="58" height="26" viewBox="0 0 58 26">
    <path d="M2 26 Q29 -6 56 26 Q29 14 2 26 Z" fill="#FFB347"/>
  </svg>`;
}
const shellWrap = el(`<div class="shell-wrap" style="left:18%;"></div>`);
shellWrap.innerHTML = `<div style="position:relative;">${shellSVG()}<div class="shell-top" style="position:absolute;top:0;left:0;">${shellTopSVG()}</div></div>`;
root.appendChild(shellWrap);

/* ════════════════ POISSONS (palette guide de style) ════════════════ */
function fishSVG(body, fin, accent){
  return `<svg width="50" height="30" viewBox="0 0 50 30">
    <path d="M6 15 Q10 5 22 4 Q36 3 43 11 Q47 13 47 15 Q47 17 43 19 Q36 27 22 26 Q10 25 6 15 Z" fill="${body}"/>
    <path d="M6 15 L-7 4 L-7 26 Z" fill="${fin}"/>
    <path d="M20 5 Q24 -2 30 1 Q26 5 26 9 Z" fill="${fin}"/>
    <path d="M14 9 Q20 15 14 21" stroke="${accent}" stroke-width="2.2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M23 8 Q29 15 23 22" stroke="${accent}" stroke-width="2.2" fill="none" opacity="0.45" stroke-linecap="round"/>
    <circle cx="36" cy="13" r="2.4" fill="#1a1a22"/>
    <circle cx="36.7" cy="12.1" r="0.7" fill="#fff" opacity="0.9"/>
  </svg>`;
}
const fishPalette = [
  ['#FF6F61','#e0564a','#ffb3a8'], // corail
  ['#FFD166','#e0ad1a','#fff3c0'], // jaune doux
  ['#219EBC','#1a7a96','#bdeaf5'], // turquoise
  ['#FF6FAE','#e0457f','#ffd6e6'], // rose
  ['#A78BFA','#8a6bd9','#e0d6ff'], // lavande
  ['#FFB347','#e08c1f','#ffe0b0'], // orange
];
function spawnFish(count){
  const sizeCategories = [
    {scaleMin:0.5, scaleMax:0.7},
    {scaleMin:0.8, scaleMax:1.0},
    {scaleMin:1.1, scaleMax:1.4},
  ];
  for(let i=0;i<count;i++){
    const [body,fin,accent] = fishPalette[i % fishPalette.length];
    const cat = sizeCategories[i % sizeCategories.length];
    const scale = cat.scaleMin + Math.random()*(cat.scaleMax - cat.scaleMin);
    const top = 12 + Math.random()*55;
    const dur = (cat.scaleMax > 1 ? 24 : 17) + Math.random()*16;
    const delay = Math.random()*-dur;
    const reverse = Math.random() > 0.5;
    const isCurious = i === 2; // un poisson qui regarde la caméra
    const cls = 'fish' + (isCurious ? ' curious' : '');
    const animName = isCurious ? 'swim-curious' : (reverse?'swim-rev':'swim');
    const f = el(`<div class="${cls}" style="top:${top}%;transform:scale(${scale.toFixed(2)});animation-name:${animName};animation-duration:${dur}s;animation-delay:${delay}s;"></div>`);
    f.innerHTML = fishSVG(body, fin, accent);
    root.appendChild(f);
  }
}
spawnFish(11);

/* -- Poisson-clown (orange/blanc rayé, motif fidèle au guide) -- */
function clownfishSVG(){
  return `<svg width="48" height="30" viewBox="0 0 48 30">
    <path d="M5 15 Q9 5 21 4 Q35 3 42 11 Q46 13 46 15 Q46 17 42 19 Q35 27 21 26 Q9 25 5 15 Z" fill="#FF6F61"/>
    <path d="M14 4 Q14 15 14 26" stroke="#fff" stroke-width="4" fill="none"/>
    <path d="M26 4 Q26 15 26 26" stroke="#fff" stroke-width="4" fill="none"/>
    <path d="M5 15 L-7 4 L-7 26 Z" fill="#e0564a"/>
    <circle cx="36" cy="13" r="2.4" fill="#1a1a22"/>
    <circle cx="36.7" cy="12.1" r="0.7" fill="#fff" opacity="0.9"/>
  </svg>`;
}
const clownfish = el(`<div class="fish" style="top:68%;animation-name:swim-rev;animation-duration:21s;animation-delay:-4s;transform:scale(1);"></div>`);
clownfish.innerHTML = clownfishSVG();
root.appendChild(clownfish);

/* ════════════════ TORTUE (cligne des yeux) ════════════════ */
function turtleSVG(){
  return `<svg width="100" height="70" viewBox="0 0 100 70">
    <ellipse cx="55" cy="38" rx="32" ry="24" fill="#7a9d52"/>
    <path d="M30 38 Q40 18 55 18 Q75 18 80 38 Q75 55 55 58 Q35 55 30 38 Z" fill="#8fb563"/>
    <path d="M55 18 L55 58 M38 24 L48 50 M72 24 L62 50 M30 38 L80 38" stroke="#6f9148" stroke-width="2" opacity="0.6" fill="none"/>
    <ellipse cx="18" cy="36" rx="13" ry="9" fill="#a8c878"/>
    <circle cx="10" cy="33" r="2.6" class="turtle-eye" fill="#2a2a22"/>
    <path d="M85 30 Q95 26 96 36 Q90 38 85 40" fill="#8fb563"/>
    <path d="M22 56 Q18 64 10 64" stroke="#8fb563" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M30 58 Q26 66 18 68" stroke="#8fb563" stroke-width="7" fill="none" stroke-linecap="round"/>
  </svg>`;
}
const turtle = el(`<div class="turtle" style="top:10%;animation-duration:32s;animation-delay:-6s;"></div>`);
turtle.innerHTML = turtleSVG();
root.appendChild(turtle);

/* ════════════════ MÉDUSES (violette + rose, remontent en ondulant) ════════════════ */

/* ════════════════ TIMER 5 MIN — REPART À ZÉRO À CHAQUE SORTIE ════════════════ */
/* Secret timer: counts active time only while this page is visible.
   It is NOT persisted — leaving the page (visibility hidden, navigation away,
   or closing) resets it. Coming back always starts fresh from 0. */
const INTERVAL_MS = 5 * 60 * 1000;

let elapsed = 0;
let tickHandle = null;

function tick(){
  elapsed += 1000;
  if(elapsed >= INTERVAL_MS){
    elapsed = 0;
    showMermaid();
  }
}

function startTimer(){
  if(tickHandle) return;
  tickHandle = setInterval(tick, 1000);
}
function stopTimer(){
  if(tickHandle){ clearInterval(tickHandle); tickHandle = null; }
}
function resetTimer(){
  stopTimer();
  elapsed = 0;
}

/* Pause while tab hidden, resume (without resetting) when visible again.
   Full reset only happens when actually leaving this page. */
document.addEventListener('visibilitychange', () => {
  if(document.hidden){ stopTimer(); } else { startTimer(); }
});
window.addEventListener('beforeunload', resetTimer);
window.addEventListener('pagehide', resetTimer);

startTimer();

/* ════════════════ LOADING VEIL ════════════════ */
window.addEventListener('load', () => {
  setTimeout(()=>{ document.getElementById('loadingVeil').classList.add('hide'); }, 600);
});

/* ════════════════ FULLSCREEN (YouTube-style) ════════════════ */
const frame = document.getElementById('frame');
const fsBtn = document.getElementById('fsBtn');
const topbar = document.getElementById('topbar');

function toggleFullscreen(){
  if(!document.fullscreenElement){
    frame.requestFullscreen?.() || frame.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
}
fsBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleFullscreen(); });
frame.addEventListener('dblclick', toggleFullscreen);

/* Auto-hide topbar after inactivity, like a video player */
let hideTimeout;
function showBar(){
  topbar.classList.remove('hidden');
  clearTimeout(hideTimeout);
  hideTimeout = setTimeout(()=> topbar.classList.add('hidden'), 3200);
}
document.addEventListener('mousemove', showBar);
document.addEventListener('touchstart', showBar);
showBar();
</script>
