<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aquarium Magique — J&S Sun Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
:root{
  --bg:#0a0a0f; --surface:#13131a; --accent:#c9a84c;
  --text:#e8e8f0; --text-dim:#a2a2bd;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* ── Top bar (player-like) ── */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;gap:14px;padding:0 18px;background:rgba(10,10,15,.85);backdrop-filter:blur(10px);z-index:50;transition:opacity .3s;}
.topbar.hidden{opacity:0;pointer-events:none;}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.06);transition:background .2s;}
.back-btn:hover{background:rgba(255,255,255,.12);}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:var(--accent);flex:1;text-align:center;}
.fs-btn{background:rgba(255,255,255,.06);border:none;color:var(--text);width:38px;height:38px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.fs-btn:hover{background:rgba(255,255,255,.12);}

/* ── Aquarium viewport (the "video") ── */
.player-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
.aquarium-frame{position:relative;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#0d3b54 0%,#0a2a3d 45%,#061c2b 100%);cursor:pointer;}

/* Light rays */
.light-ray{position:absolute;top:-10%;width:120px;height:140%;background:linear-gradient(180deg,rgba(180,230,255,.18),rgba(180,230,255,0));transform:rotate(8deg);pointer-events:none;}
.light-ray.r2{left:30%;width:80px;transform:rotate(-6deg);opacity:.6;}
.light-ray.r3{left:65%;width:100px;transform:rotate(10deg);opacity:.5;}

/* Bubbles */
.bubble{position:absolute;bottom:-40px;border-radius:50%;border:1.5px solid rgba(200,235,255,.5);background:rgba(200,235,255,.08);animation:rise linear infinite;}
@keyframes rise{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  10%{opacity:.8;}
  90%{opacity:.6;}
  100%{transform:translateY(-115vh) translateX(20px);opacity:0;}
}

/* Seaweed */
.weed{position:absolute;bottom:0;transform-origin:bottom center;animation:sway ease-in-out infinite;}
.weed svg{display:block;filter:drop-shadow(0 0 6px rgba(0,0,0,.3));}
@keyframes sway{
  0%,100%{transform:rotate(-6deg);}
  50%{transform:rotate(6deg);}
}

/* Coral */
.coral{position:absolute;bottom:0;}

/* Sand */
.sand{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(180deg,#3a2e1a,#241a0e);border-radius:50% 50% 0 0 / 100% 100% 0 0;}

/* Fish swim */
.fish{position:absolute;animation:swim linear infinite;}
.fish svg{display:block;}
.fish.flip svg{transform:scaleX(-1);}
@keyframes swim{
  0%{transform:translateX(-10vw) translateY(0);}
  50%{transform:translateX(55vw) translateY(-20px);}
  100%{transform:translateX(120vw) translateY(10px);}
}
@keyframes swim-rev{
  0%{transform:translateX(10vw) translateY(0) scaleX(-1);}
  50%{transform:translateX(-55vw) translateY(15px) scaleX(-1);}
  100%{transform:translateX(-120vw) translateY(-10px) scaleX(-1);}
}

/* Mermaid */
.mermaid-wrap{position:absolute;bottom:8%;opacity:0;pointer-events:none;z-index:20;transition:opacity 1.2s ease;}
.mermaid-wrap.show{opacity:1;animation:mermaid-swim-in 11s ease-in-out forwards;}
.mermaid-wrap svg{display:block;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4));}
@keyframes mermaid-swim-in{
  0%{left:-25%;transform:translateY(0) scale(.92);}
  12%{transform:translateY(-10px) scale(1);}
  45%{left:38%;transform:translateY(6px) scale(1.05);}
  55%{left:38%;transform:translateY(0) scale(1.05);}
  85%{left:38%;transform:translateY(-4px) scale(1.02);}
  100%{left:120%;transform:translateY(0) scale(.95);}
}
.mermaid-wave{animation:wave-hand 0.6s ease-in-out infinite;transform-origin:70% 70%;}
@keyframes wave-hand{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(-18deg);}
}

/* Loading veil */
.loading-veil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#061c2b;z-index:40;transition:opacity .6s;}
.loading-veil.hide{opacity:0;pointer-events:none;}
.loading-veil span{font-family:'Syne',sans-serif;color:var(--accent);font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;opacity:.7;}

@media(max-width:700px){
  .topbar-title{font-size:.8rem;}
  .back-btn span{display:none;}
}
</style>
</head>
<body>

<script>
/* ════════════════ SCENE BUILD ════════════════ */
const root = document.getElementById('sceneRoot');

function el(html){
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstChild;
}

/* -- Light rays -- */
root.appendChild(el('<div class="light-ray"></div>'));
root.appendChild(el('<div class="light-ray r2"></div>'));
root.appendChild(el('<div class="light-ray r3"></div>'));

/* -- Bubbles -- */
function spawnBubbles(n){
  for(let i=0;i<n;i++){
    const size = 6 + Math.random()*16;
    const left = Math.random()*100;
    const dur = 7 + Math.random()*10;
    const delay = Math.random()*-dur;
    const b = el(`<div class="bubble" style="width:${size}px;height:${size}px;left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;"></div>`);
    root.appendChild(b);
  }
}
spawnBubbles(22);

/* -- Seaweed (SVG) -- */
function weedSVG(color, h){
  const leaves = [];
  const n = Math.floor(h/22);
  for(let i=0;i<n;i++){
    const y = h - i*22 - 10;
    const side = i % 2 === 0 ? 1 : -1;
    leaves.push(`<path d="M20 ${y} Q${20+side*16} ${y-8} ${20+side*4} ${y-20}" stroke="${color}" stroke-width="5.5" fill="none" stroke-linecap="round"/>`);
  }
  return `<svg width="56" height="${h}" viewBox="0 0 56 ${h}">
    <path d="M20 ${h} C10 ${h*0.7} 32 ${h*0.45} 16 ${h*0.2} C28 ${h*0.05} 14 0 20 0"
      stroke="${color}" stroke-width="6" fill="none" stroke-linecap="round"/>
    ${leaves.join('')}
  </svg>`;
}
const weedSpots = [
  {left:'3%', h:150, color:'#1f6b4a', dur:'4.5s'},
  {left:'9%', h:100, color:'#28825c', dur:'3.8s'},
  {left:'90%', h:170, color:'#1f6b4a', dur:'5.2s'},
  {left:'95%', h:110, color:'#28825c', dur:'4s'},
  {left:'48%', h:90, color:'#1f6b4a', dur:'4.2s'},
];
weedSpots.forEach(w=>{
  const wrap = el(`<div class="weed" style="left:${w.left};animation-duration:${w.dur};"></div>`);
  wrap.innerHTML = weedSVG(w.color, w.h);
  root.appendChild(wrap);
});

function spawnFish(count){
  for(let i=0;i<count;i++){

    const reverse = Math.random() > 0.5;
    const f = el(`<div class="fish" style="top:${top}%;transform:scale(${scale});animation-name:${reverse?'swim-rev':'swim'};animation-duration:${dur}s;animation-delay:${delay}s;"></div>`);
    f.innerHTML = fishSVG(body, fin, accent);
    root.appendChild(f);

const mermaidSVGs = [mermaid1, mermaid2, mermaid3];

function showMermaid(){
  const idx = getNextMermaidIndex();
  const wrap = document.createElement('div');
  wrap.className = 'mermaid-wrap';
  wrap.style.bottom = (10 + Math.random()*15) + '%';
  wrap.innerHTML = mermaidSVGs[idx]();
  root.appendChild(wrap);
  requestAnimationFrame(()=> wrap.classList.add('show'));
  setTimeout(()=>{ wrap.remove(); }, 11500);
}

function getNextMermaidIndex(){
  let idx = parseInt(localStorage.getItem('jss_mermaid_idx') || '0', 10);
  const next = (idx + 1) % 3;
  localStorage.setItem('jss_mermaid_idx', String(next));
  return idx;
}

/* ════════════════ PERSISTENT 15-MIN TIMER ════════════════ */
/* Secret timer: counts active time only; pauses when leaving this page.
   Stored in localStorage so it survives navigation back to home and returning here. */
const INTERVAL_MS = 15 * 60 * 1000;
const STORE_KEY = 'jss_aquarium_timer_elapsed_ms';
const LAST_TICK_KEY = 'jss_aquarium_timer_last_tick';

let elapsed = parseFloat(localStorage.getItem(STORE_KEY) || '0');
let tickHandle = null;

function persistElapsed(){
  localStorage.setItem(STORE_KEY, String(elapsed));
}

function tick(){
  elapsed += 1000;
  if(elapsed >= INTERVAL_MS){
    elapsed = 0;
    showMermaid();
  }
  persistElapsed();
}

function startTimer(){
  if(tickHandle) return;
  tickHandle = setInterval(tick, 1000);
}
function stopTimer(){
  if(tickHandle){ clearInterval(tickHandle); tickHandle = null; }
  persistElapsed();
}

/* Start when page visible/active, pause when hidden or leaving */
document.addEventListener('visibilitychange', () => {
  if(document.hidden){ stopTimer(); } else { startTimer(); }
});
window.addEventListener('beforeunload', stopTimer);
window.addEventListener('pagehide', stopTimer);

startTimer();

/* ════════════════ LOADING VEIL ════════════════ */
window.addEventListener('load', () => {
  setTimeout(()=>{ document.getElementById('loadingVeil').classList.add('hide'); }, 600);
});

/* ════════════════ FULLSCREEN (YouTube-style) ════════════════ */
const frame = document.getElementById('frame');
const fsBtn = document.getElementById('fsBtn');
const topbar = document.getElementById('topbar');

function toggleFullscreen(){
  if(!document.fullscreenElement){
    frame.requestFullscreen?.() || frame.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
}
fsBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleFullscreen(); });
frame.addEventListener('dblclick', toggleFullscreen);

/* Auto-hide topbar after inactivity, like a video player */
let hideTimeout;
function showBar(){
  topbar.classList.remove('hidden');
  clearTimeout(hideTimeout);
  hideTimeout = setTimeout(()=> topbar.classList.add('hidden'), 3200);
}
document.addEventListener('mousemove', showBar);
document.addEventListener('touchstart', showBar);
showBar();
</script>
