<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fleurs &amp; Résines CBD — J&amp;S Sun Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --border: rgba(255,255,255,0.07);
  --accent: #c9a84c;
  --accent2: #ff6b6b;
  --accent3: #7eb8f7;
  --text: #e8e8f0;
  --text-dim: #a2a2bd;
  --text-dimmer: #6a6a86;
  --tr: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  background:rgba(10,10,15,0.94);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  display:flex; align-items:center;
  height:68px;
}

.nav-logo {
  height:50px; width:auto; flex-shrink:0; margin-right:28px;
  filter:drop-shadow(0 0 8px rgba(201,168,76,0.25));
  transition:filter 0.3s;
}
.nav-logo:hover { filter:drop-shadow(0 0 16px rgba(201,168,76,0.55)); }

.nav-links { display:flex; align-items:center; gap:2px; flex:1; flex-wrap:wrap; }

.nav-link {
  text-decoration:none;
  font-family:'DM Sans',sans-serif;
  font-size:0.72rem; font-weight:600; letter-spacing:0.07em;
  color:var(--text-dim);
  padding:6px 13px; border-radius:5px;
  border:1px solid transparent;
  transition:all var(--tr); white-space:nowrap;
}
.nav-link:hover { color:var(--text); border-color:rgba(201,168,76,0.3); background:rgba(201,168,76,0.06); }
.nav-link.active { color:var(--accent); border-color:rgba(201,168,76,0.3); background:rgba(201,168,76,0.07); }

.nav-burger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; margin-left:auto; }
.nav-burger span { display:block; width:22px; height:2px; background:var(--accent); border-radius:2px; }
.nav-mobile {
  display:none; position:fixed; top:68px; left:0; right:0;
  background:rgba(10,10,15,0.98); border-bottom:1px solid var(--border);
  padding:14px; flex-direction:column; gap:4px; z-index:199;
  backdrop-filter:blur(20px);
}
.nav-mobile.open { display:flex; }
.nav-mobile .nav-link { font-size:0.9rem; padding:10px 16px; }

.page { padding-top:68px; min-height:100vh; }

@media(max-width:880px) {
  nav { padding:0 16px; }
  .nav-links { display:none; }
  .nav-burger { display:flex; }
}

/* Global search bar */
.global-search-section{width:100%;max-width:600px;margin:28px auto 0;padding:0 20px;position:relative;z-index:1;}
.global-search-wrap{position:relative;}
.global-search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);pointer-events:none;}
.global-search-input{
  width:100%;background:var(--surface);border:2px solid var(--border);
  border-radius:50px;padding:14px 20px 14px 48px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;
  outline:none;transition:all .25s;box-sizing:border-box;
}
.global-search-input:focus{border-color:var(--accent);background:rgba(201,168,76,.04);box-shadow:0 0 0 4px rgba(201,168,76,.1);}
.global-search-input::placeholder{color:var(--text-dimmer);}
.global-search-results{
  display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  max-height:360px;overflow-y:auto;z-index:200;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}
.global-search-results.open{display:block;}
.search-result-item{
  padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .15s;display:flex;align-items:center;gap:12px;
}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:hover{background:rgba(201,168,76,.06);}
.sri-label{font-size:0.72rem;color:var(--text-dimmer);margin-bottom:2px;text-transform:uppercase;letter-spacing:.08em;}
.sri-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:#fff;}
.sri-brand{font-size:0.75rem;color:var(--text-dim);}
.sri-cat{font-size:0.65rem;padding:2px 7px;border-radius:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--accent);font-weight:600;white-space:nowrap;}
.search-no-result{padding:20px;text-align:center;color:var(--text-dimmer);font-size:0.9rem;}

.gs-section{width:100%;max-width:560px;position:relative;z-index:1;margin-top:24px;}
.gs-outer{position:relative;}
.gs-outer svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);pointer-events:none;}
.gs-main{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:50px;padding:13px 20px 13px 50px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:all .25s;box-sizing:border-box;}
.gs-main:focus{border-color:var(--accent);background:rgba(201,168,76,.04);box-shadow:0 0 0 4px rgba(201,168,76,.08);}
.gs-main::placeholder{color:var(--text-dimmer);}
.gs-drop{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;max-height:300px;overflow-y:auto;z-index:200;box-shadow:0 16px 40px rgba(0,0,0,.5);}
.gs-drop.open{display:block;}
.gs-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.gs-item:last-child{border-bottom:none;}
.gs-item:hover{background:rgba(201,168,76,.06);}
.gs-item-left .gs-lbl{font-size:0.7rem;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
.gs-item-left .gs-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;color:#fff;}
.gs-item-left .gs-brand{font-size:0.74rem;color:var(--text-dim);}
.gs-cat{font-size:0.62rem;padding:2px 7px;border-radius:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--accent);font-weight:600;white-space:nowrap;}

.home-section{min-height:calc(100vh - 68px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 40px 60px;position:relative;overflow:hidden;}
.home-bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse 90% 60% at 50% 30%,rgba(201,168,76,0.07),transparent 65%);pointer-events:none;}
.home-logo{height:130px;width:auto;margin-bottom:32px;filter:drop-shadow(0 0 24px rgba(201,168,76,.35));animation:logoPulse 3s ease-in-out infinite;position:relative;z-index:1;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 18px rgba(201,168,76,.3));}50%{filter:drop-shadow(0 0 38px rgba(201,168,76,.6));}}
.home-location{font-size:0.78rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-top:24px;position:relative;z-index:1;}

/* Cards */
.nav-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:780px;width:100%;position:relative;z-index:1;}
.nav-card{text-decoration:none;aspect-ratio:2/3;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px 12px;transition:all .22s;box-shadow:0 4px 14px rgba(0,0,0,.3);}
.nav-card:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06);transform:translateY(-5px) scale(1.02);box-shadow:0 12px 28px rgba(0,0,0,.45);}
.nav-card-icon{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));transition:transform .22s;}
.nav-card:hover .nav-card-icon{transform:scale(1.08);}
.nav-card-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);text-align:center;line-height:1.4;}

/* Search bar */
.gs-section{width:100%;max-width:560px;position:relative;z-index:1;margin-top:20px;}
.gs-outer{position:relative;}
.gs-outer svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);pointer-events:none;}
.gs-main{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:50px;padding:13px 20px 13px 50px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:all .25s;box-sizing:border-box;}
.gs-main:focus{border-color:var(--accent);background:rgba(201,168,76,.04);box-shadow:0 0 0 4px rgba(201,168,76,.08);}
.gs-main::placeholder{color:var(--text-dimmer);}
.gs-drop{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;max-height:300px;overflow-y:auto;z-index:200;box-shadow:0 16px 40px rgba(0,0,0,.5);}
.gs-drop.open{display:block;}
.gs-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.gs-item:last-child{border-bottom:none;}
.gs-item:hover{background:rgba(201,168,76,.06);}
.gs-lbl{font-size:0.7rem;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
.gs-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;color:#fff;}
.gs-cat{font-size:0.62rem;padding:2px 7px;border-radius:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--accent);font-weight:600;white-space:nowrap;}

@media(max-width:600px){.nav-cards{grid-template-columns:repeat(2,1fr);gap:12px;max-width:420px;}.home-section{padding:32px 20px 48px;}.nav-card-icon{width:60px;height:60px;}}

.cbd-page{display:flex;gap:26px;align-items:flex-start;min-height:calc(100vh - 68px);}

/* Sidebar */
.cbd-sb{width:238px;flex-shrink:0;background:transparent;border-right:none;padding:26px 4px 60px 22px;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto;}
.cbd-sb-title{display:block;font-size:0.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dimmer);padding:0 6px 14px;}

/* ── Cartes de catégorie (rectangles horizontaux) ── */
.cat-btn{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  margin-bottom:10px;padding:12px 13px;position:relative;overflow:hidden;
  background:var(--surface2);border:1px solid var(--border);border-radius:13px;
  cursor:pointer;line-height:1.2;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  transition:transform .2s cubic-bezier(.4,0,.2,1),border-color .2s,background .2s,box-shadow .2s;
}
.cat-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform .2s;}
.cat-btn:hover{transform:translateY(-2px);box-shadow:0 9px 22px rgba(0,0,0,.42);}
.cat-btn:hover .cat-ch{opacity:1;transform:translateX(0);}
.cat-btn.active{box-shadow:0 2px 8px rgba(0,0,0,.3);}
.cat-btn.active::before{transform:scaleY(1);}
.cat-btn.active .cat-ic{}
.cat-btn.active .cat-nm{}
.cat-ic{flex-shrink:0;width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.15rem;transition:background .2s,border-color .2s;}
.cat-tx{flex:1;min-width:0;}
.cat-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;color:var(--text);letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;}
.cat-sub{font-size:0.62rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dimmer);margin-top:3px;}
.cat-ch{flex-shrink:0;color:var(--accent);font-size:1.15rem;line-height:1;opacity:0;transform:translateX(-5px);transition:opacity .2s,transform .2s;}

/* Main */
.cbd-main{flex:1;min-width:0;display:flex;flex-direction:column;border-left:1px solid var(--border);}

.store-btn{padding:13px 22px;font-family:'Syne',sans-serif;font-size:0.74rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;background:none;border:none;border-bottom:3px solid transparent;color:var(--text-dim);cursor:pointer;transition:color .18s,border-color .18s;display:flex;align-items:center;gap:7px;}
.store-btn:hover{color:var(--text);border-bottom-color:rgba(201,168,76,.3);}
.store-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.sdot{width:7px;height:7px;border-radius:50%;}
.sdot-b{background:#4ade80;}.sdot-r{background:#60a5fa;}.sdot-g{background:#f0b429;}.sdot-p{background:#c084fc;}.sdot-o{background:#fb923c;}
.cbd-wrap{padding:24px 28px 80px 34px;height:calc(100vh - 68px);overflow:auto;}
.cat-heading{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#fff;margin:0 0 20px;display:flex;align-items:center;gap:10px;}
.store-pill{font-size:0.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:3px 10px;border-radius:10px;}
.pill-b{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.28);}
.pill-r{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.28);}

/* Table — smooth, borderless */
.price-table{width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:24px;}
.price-table thead th{font-size:0.92rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(170,170,190,.9);padding:9px 6px 11px;text-align:center;border:none;border-bottom:1px solid rgba(255,255,255,.1);background:var(--bg);position:sticky;top:68px;z-index:5;}
.price-table th.hl,.price-table td.hl{background:rgba(201,168,76,.07);box-shadow:inset 1px 0 rgba(201,168,76,.16),inset -1px 0 rgba(201,168,76,.16);}
.price-table thead th.hl{background:rgba(201,168,76,.12);color:var(--accent);}
.price-table thead th.cn{text-align:left;width:130px;}
.price-table thead th.cg{width:76px;}
.price-table tr.pr td{padding:11px 6px 4px;border:none;text-align:center;vertical-align:bottom;}
.price-table tr.pr td.cn{text-align:left;font-weight:700;color:#f3f3f7;font-size:1.12rem;padding-left:0;}
.price-table tr.pr td.pc{font-weight:800;color:var(--accent);font-size:1.2rem;letter-spacing:-.02em;}
.price-table tr.pr td.da{color:rgba(120,120,140,.45);}
.price-table tr.pr:hover td{background:rgba(201,168,76,.04);}
.price-table tr.ppg td{padding:2px 6px 12px;border:none;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;vertical-align:top;font-size:0.68rem;color:rgba(150,150,170,.45);font-style:italic;}
.price-table tr.ppg td.cn{text-align:left;padding-left:0;color:rgba(120,120,140,.35);font-size:0.65rem;}
.price-table tr.gap td{padding:5px 0;border:none;}
.mat-sep{height:18px;}

/* Admin */
.admin-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:860px;padding:32px;position:relative;}
.admin-box h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:#fff;margin-bottom:4px;}
.admin-sub{font-size:0.82rem;color:var(--text-dim);margin-bottom:24px;}
.admin-close{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--border);color:var(--text-dim);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;}
.admin-close:hover{border-color:#ff6b6b;color:#ff6b6b;}
.admin-sec{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);}
.admin-sec:last-child{border-bottom:none;margin-bottom:0;}
.admin-sec h3{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;}
.af{margin-bottom:10px;}.af label{font-size:0.78rem;color:var(--text-dim);display:block;margin-bottom:4px;}
.af input,.af select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;width:100%;}
.af input:focus,.af select:focus{border-color:rgba(201,168,76,.4);}
.ar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px;}
.ar .af{flex:1;min-width:160px;margin-bottom:0;}
.pogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin:12px 0;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.pogrid label{font-size:0.72rem;color:var(--text-dim);display:block;margin-bottom:3px;}
.pogrid input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:5px;font-size:0.82rem;width:100%;text-align:center;outline:none;}
.pogrid input:focus{border-color:rgba(201,168,76,.4);}
.btn-add{padding:10px 22px;background:var(--accent);color:#0a0a0f;border:none;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
.btn-add:hover{background:#e2c97e;}
.btn-del{padding:6px 14px;background:none;color:#ff6b6b;border:1px solid rgba(255,107,107,.3);border-radius:6px;font-size:0.75rem;cursor:pointer;}
.btn-sec{padding:9px 18px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:6px;font-size:0.8rem;cursor:pointer;}
.li{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:6px;margin-bottom:5px;font-size:0.84rem;gap:8px;}
.amsg{font-size:.78rem;color:var(--accent);min-height:18px;margin-top:6px;}
.ibox{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:8px;padding:12px 16px;font-size:0.82rem;color:var(--text-dim);line-height:1.65;margin-bottom:14px;}
.ibox strong{color:var(--accent);}
.pwd-sc{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 20px;}
.pwd-sc h2{font-family:'Syne',sans-serif;color:#fff;font-size:1.3rem;}
.pwd-sc input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:1rem;outline:none;width:260px;text-align:center;letter-spacing:.15em;}
.pwd-sc input:focus{border-color:rgba(201,168,76,.4);}
.pwd-err{color:#ff6b6b;font-size:0.8rem;min-height:18px;}
.exp-btns{display:flex;gap:8px;flex-wrap:wrap;}

@media(max-width:900px){.cbd-sb{width:204px;padding-left:14px;}.cat-ic{width:34px;height:34px;font-size:1.05rem;}.cat-nm{font-size:0.86rem;}}
@media(max-width:640px){
  .cbd-page{flex-direction:column;gap:0;}
  .cbd-sb{width:100%;height:auto;position:static;border-right:none;display:flex;flex-wrap:nowrap;gap:10px;padding:12px 12px 4px;overflow-x:auto;overflow-y:visible;}
  .cbd-sb-title{display:none;}
  .cat-btn{margin-bottom:0;flex:0 0 auto;width:auto;padding:9px 13px;}
  .cat-sub,.cat-ch{display:none;}
  .cat-ic{width:30px;height:30px;font-size:1rem;}
  .cbd-main{border-left:none;}
  .cbd-wrap{padding:16px 12px 60px;height:auto;overflow:visible;}
  .price-table thead th.cn{width:90px;}
  .price-table thead th.cg{width:58px;}
  .price-table tr.pr td.pc{font-size:1rem;}
}

/* Store bar — bottom */
.store-bar-bottom{display:flex;align-items:center;gap:8px;margin-bottom:20px;margin-top:32px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07);}
.store-btn-b{padding:10px 22px;font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.store-btn-b:hover{border-color:rgba(201,168,76,.35);color:var(--text);}
.store-btn-b.active{background:var(--accent);border-color:var(--accent);color:#0a0a0f;font-weight:700;}

/* ── Couleurs par catégorie ── */
function catColor(cat){
  const m = {
    'Small Buds':'#C5A84C','Greenhouse':'#5C9068','Hydro / Indoor':'#4C7FB5',
    'Résines Naturelles':'#9C8260','Isolats':'#7090A8',
    'Fleurs Molécule':'#8A6BB5','Résines Molécule':'#6A4E94'
  };
  return m[cat]||'#c9a84c';
}

/* ── État ── */
let currentStore = 'barberey';
let currentCat   = null;
const FLEURS_GRAMS_DEFAULT = [1,3,5,10,25,50,100];
window.firebaseCbdProducts = [];
window.firebaseCbdVilles = {};

function getData(){ return currentStore==='barberey' ? DEFAULT_BARBEREY : DEFAULT_ROMILLY; }

/* Construit la liste plate {nom, prices, grams, _admin, key} pour une catégorie,
   en fusionnant données statiques + produits Firebase (filtrés par ville sélectionnée),
   triée par prix au 10g croissant. Les colonnes (grammages) sont l'union croissante
   de tous les grammages utilisés par les produits affichés. */
function getFlatProductsForCat(cat){
  const data = getData();
  let list = [];

  // Produits statiques (legacy Barberey/Romilly), uniquement si la ville courante est l'une des deux historiques
  if((currentStore === 'barberey' || currentStore === 'romilly') && data[cat]){
    data[cat].matrices.forEach(matrix => {
      matrix.products.forEach(prod => {
        list.push({ nom: prod, prices: matrix.prices, grams: data[cat].grams });
      });
    });
  }

  // Produits Firebase de cette catégorie, filtrés par ville sélectionnée
  (window.firebaseCbdProducts||[]).forEach(p => {
    if((p.cat||'').toLowerCase() !== cat.toLowerCase()) return;
    const villesProduit = p.villes || [];
    // Si le produit n'a aucune ville assignée, on l'affiche partout (comportement rétro-compatible)
    if(villesProduit.length && !villesProduit.includes(currentStore)) return;
    list.push({ nom: p.nom, prices: p.prices, grams: p.grams || getGramsForCat(cat), _admin: true });
  });

  // Grammages = union croissante de tous les grammages réellement utilisés
  const gramSet = new Set();
  list.forEach(item => item.grams.forEach(g => gramSet.add(g)));
  const grams = Array.from(gramSet).sort((a,b) => a-b);

  // Tri par prix au 10g croissant (produits sans prix au 10g vont en fin de liste)
  list.sort((a, b) => {
    const ia = a.grams.indexOf(10), ib = b.grams.indexOf(10);
    const pa = ia>=0 ? a.prices[ia] : null;
    const pb = ib>=0 ? b.prices[ib] : null;
    if(pa===null && pb===null) return 0;
    if(pa===null) return 1;
    if(pb===null) return -1;
    return pa - pb;
  });

  return { grams, list };
}

function getGramsForCat(cat){
  return RESINES_CATS.includes(cat) ? RESINES_GRAMS : FLEURS_GRAMS_DEFAULT;
}


/* ── Sidebar ── */
function buildSB(){
  const data = getData();
  const sb = document.getElementById('cbd-sb');
  sb.innerHTML = '<div class="cbd-sb-title">Catégories</div>';
  Object.keys(data).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat===currentCat?' active':'');
    btn.style.setProperty('--cc', catColor(cat));
    const emoji = {
      'Small Buds':'🌿','Greenhouse':'🏡','Hydro / Indoor':'💧',
      'Résines Naturelles':'🍯','Isolats':'⭐','Fleurs Molécule':'🔬','Résines Molécule':'🧪'
    }[cat]||'🌱';
    btn.innerHTML = `<div class="cat-ic">${emoji}</div><div class="cat-nm">${cat}</div>`;
    btn.onclick = () => { currentCat=cat; buildSB(); renderCat(); };
    sb.appendChild(btn);
  });
  // Onglet Pré-rolls (page en construction)
  const prBtn = document.createElement('button');
  prBtn.className = 'cat-btn' + (currentCat==='Pré-rolls' ? ' active' : '');
  prBtn.style.setProperty('--cc', '#9a9aae');
  prBtn.innerHTML = `<div class="cat-ic">🚬</div><div class="cat-nm">Pré-rolls</div>`;
  prBtn.onclick = () => { currentCat='Pré-rolls'; buildSB(); renderCat(); };
  sb.appendChild(prBtn);
}

/* ── Tableau prix ── */
function renderCat(){
  const data = getData();
  const content = document.getElementById('cbd-content');
  if(currentCat === 'Pré-rolls'){
    content.innerHTML = '<p style="color:var(--text-dimmer);padding:60px;text-align:center;font-size:1.1rem;">Page en construction</p>';
    return;
  }
  if(!currentCat){ content.innerHTML='<p style="color:var(--text-dimmer);padding:40px;text-align:center;">Sélectionnez une catégorie</p>'; return; }

  const isResine = RESINES_CATS.includes(currentCat);
  const isIsolat = currentCat === 'Isolats';
  const color = catColor(currentCat);
  const label = isIsolat ? 'Isolat' : (isResine ? 'Résine' : 'Fleur');

  const { grams: usedGrams, list } = getFlatProductsForCat(currentCat);

  if(!list.length){ content.innerHTML = `<div class="cat-heading" style="color:${color}">${currentCat}</div><p style="color:var(--text-dimmer);padding:40px;text-align:center;">Aucun produit dans cette catégorie.</p>`; return; }

  let html = `<div class="cat-heading" style="color:${color}">${currentCat}</div>`;

  html += `<table class="price-table">
    <thead>
      <tr>
        <th class="cn">${label}</th>
        ${usedGrams.map(g => `<th class="cg">${g}g</th>`).join('')}
      </tr>
    </thead>
    <tbody>`;

  list.forEach(item => {
    const prices = usedGrams.map(g => {
      const gi = item.grams.indexOf(g);
      const val = gi>=0 ? item.prices[gi] : null;
      // Masquer les prix < 5€
      if(val !== null && val !== undefined && val < 5) return null;
      return val;
    });

    // Ligne nom produit
    html += `<tr class="pr">
      <td class="cn">${item.nom}</td>
      ${prices.map(p => p!==null&&p!==undefined ? `<td class="pc" style="color:${color}">${p}&nbsp;€</td>` : '<td></td>').join('')}
    </tr>`;
    // Ligne prix/g sous le nom
    html += `<tr class="ppg">
      <td class="cn">prix/g</td>
      ${usedGrams.map((g,i) => {
        const p = prices[i];
        if(p===null||p===undefined) return '<td></td>';
        const ppg = (p/g).toFixed(2);
        return `<td>${ppg}&nbsp;€</td>`;
      }).join('')}
    </tr>`;
  });

  html += `</tbody></table>`;

  content.innerHTML = html;
}

/* ── Switch boutique ── */
function switchStore(store, btn){
  currentStore = store;
  document.querySelectorAll('.store-btn-b').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildSB();
  renderCat();
}

/* ── Construit dynamiquement les boutons de boutique depuis Firebase ── */
const STORE_DOT_COLORS = ['sdot-b','sdot-r','sdot-g','sdot-p','sdot-o'];
function buildStoreBar(){
  const bar = document.getElementById('store-bar');
  if(!bar) return;
  const villes = window.firebaseCbdVilles || {};
  const keys = Object.keys(villes);
  if(!keys.length){
    // Fallback si aucune ville en base : Romilly/Barberey historiques
    bar.innerHTML = `
      <button class="store-btn-b active" onclick="switchStore('barberey',this)"><span class="sdot sdot-b"></span>Barberey</button>
      <button class="store-btn-b" onclick="switchStore('romilly',this)"><span class="sdot sdot-r"></span>Romilly</button>`;
    if(!currentStore) currentStore = 'barberey';
    return;
  }
  if(!currentStore || !keys.includes(currentStore)) currentStore = keys[0];
  bar.innerHTML = keys.map((k, i) => {
    const dotClass = STORE_DOT_COLORS[i % STORE_DOT_COLORS.length];
    const active = k === currentStore ? ' active' : '';
    return `<button class="store-btn-b${active}" onclick="switchStore('${k}',this)"><span class="sdot ${dotClass}"></span>${villes[k].nom}</button>`;
  }).join('');
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  const data = getData();
  currentCat = Object.keys(data)[0];
  buildStoreBar();
  buildSB();
  renderCat();
  document.querySelectorAll('.nav-link').forEach(a=>{
    if(a.dataset.page===document.body.dataset.page) a.classList.add('active');
  });
});
</script>
