  provider.setCustomParameters({ login_hint: ALLOWED_EMAIL });
  try { await signInWithPopup(auth, provider); } catch(e) { log('Erreur connexion: ' + e.message); }
};

  if(user){
    log('Connecté en tant que ' + user.email);
    document.getElementById('migrate-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Connecté ✓';
    document.getElementById('login-btn').disabled = true;
  }
});

window.migrate = async () => {
  document.getElementById('migrate-btn').disabled = true;
  log('--- Vérification existant ---');
  const existing = await get(ref(db, 'cbd_matrices'));
  if(existing.exists()){
    log('⚠ Des matrices existent déjà dans cbd_matrices. Migration annulée pour éviter les doublons.');
    log('Si vous voulez réellement migrer, supprimez d\'abord manuellement le nœud "cbd_matrices" dans la console Firebase.');
    return;
  }

  log('--- Migration matrices Fleurs (' + Object.keys(FLEURS).length + ') ---');
  await set(ref(db, 'cbd_matrices/fleurs'), FLEURS);
  log('✓ Matrices fleurs migrées.');

  await set(ref(db, 'cbd_villes'), VILLES);
